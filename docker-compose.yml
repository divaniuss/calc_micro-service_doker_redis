version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  auth_service:
    build: ./auth_service
    depends_on:
      - redis
      - mongodb
    env_file:
      - ./auth_service/.env

  calc_service:
    build: ./calc_service
    depends_on:
      - redis
    env_file:
      - ./calc_service/.env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth_service
      - calc_service